# All of these fields are optional, as is this file itself,
#   in which case these values can be managed in the UI.

# The name of the stage.
# project_name: "Stage Template"

# A short tagline to show in search.
# tagline: "A base template for all stages."

# 'PUBLIC', 'PRIVATE', or 'UNLISTED'.
# visibility: 'PUBLIC'

# 'ADJACENT' | 'NONE' | 'COVER' | 'FULLSCREEN'
# 'ADJACENT' is default. The frame will display on the side of the
#   chat on desktop and above/in the top half of the chat on mobile.
# 'NONE' will not display, only run.
# 'COVER' will, indeed, cover the chat history completely,
#   but leave the text input box.
# 'FULLSCREEN' will make nothing below the header bar
#   show except for your stage.
# position: 'ADJACENT'

# Self-explanatory.
# tags:
#  - 'Stage'
#  - 'Admin'
#  - 'Template'
#  - 'Base'

# The schema of any user-supplied config.
# If your stage requires a configuration but has no
#   defined schema, it won't work.
config_schema:
  type: object
  properties:
    sheetStatuses:
      type: array
      default: []
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
            default: ''
          archetype:
            type: string
            default: ''
          favoriteSong:
            type: string
            default: ''
          description:
            type: string
            default: ''
          strength:
            type: string
            default: ''
          agility:
            type: string
            default: ''
          wits:
            type: string
            default: ''
          empathy:
            type: string
            default: ''
          health:
            type: string
            default: ''
          hope:
            type: string
            default: ''
          bliss:
            type: string
            default: ''
          permanent:
            type: string
            default: ''
          talents:
            type: string
            default: ''
          dream:
            type: string
            default: ''
          flaw:
            type: string
            default: ''
          gear:
            type: string
            default: ''
          cash:
            type: string
            default: ''
          journey:
            type: string
            default: ''
          goal:
            type: string
            default: ''
          threat:
            type: string
            default: ''
          injuriesAndTrauma:
            type: string
            default: ''
          tension:
            type: array
            default: []
            items:
              type: object
              properties:
                with:
                  type: string
                value:
                  type: string
                  default: ''
              required:
                - with
                - value
        required:
          - id
    attributeRolls:
      type: array
      default: []
      items:
        type: object
        properties:
          characterId:
            type: string
          attribute:
            type: string
          dice:
            type: array
            items:
              type: integer
          successes:
            type: integer
          timestamp:
            type: integer
        required:
          - characterId
          - attribute
          - dice
          - successes
          - timestamp

# The schema of the state that you store.
# This isn't needed even if you do store state,
#   and is here more for future use cases to
#   optimize storage.
state_schema:
  init:
    type: object
    properties:
      grid:
        type: string
  message:
    type: object
    properties:
      someKey:
        type: string
      sheetStatuses:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            archetype:
              type: string
            favoriteSong:
              type: string
            description:
              type: string
            strength:
              type: string
            agility:
              type: string
            wits:
              type: string
            empathy:
              type: string
            health:
              type: string
            hope:
              type: string
            bliss:
              type: string
            permanent:
              type: string
            talents:
              type: string
            dream:
              type: string
            flaw:
              type: string
            gear:
              type: string
            cash:
              type: string
            journey:
              type: string
            goal:
              type: string
            threat:
              type: string
            injuriesAndTrauma:
              type: string
            tension:
              type: array
              items:
                type: object
                properties:
                  with:
                    type: string
                  value:
                    type: string
      attributeRolls:
        type: array
        items:
          type: object
          properties:
            characterId:
              type: string
            attribute:
              type: string
            dice:
              type: array
              items:
                type: integer
            successes:
              type: integer
            timestamp:
              type: integer
  chat:
    type: object
    properties:
      visited:
        type: array
        items:
          type: integer

# Whether to publish as 'Anonymous' instead of under your username.
# is_anonymous: false

# Self-explanatory.
# ratings_disabled: false

# This is here for future cases where ex. you need user secrets,
#    but currently does nothing.
# permissions:

# extension_id is automatically generated on push with a new project;
#    you should not make or set this value.
# github_path will be added if it does not exist. It is the URL of the repo.


github_path: 'https://github.com/WeirdnessUnfolds/theelectricstate'


extension_id: 'theelectricstate-b47bb4d0a567'

